# Template: Custom task config for DP3
# Place in: 3D-Diffusion-Policy/diffusion_policy_3d/config/task/my_task.yaml
# Usage: bash scripts/train_policy.sh dp3 my_task exp01 0 0

defaults:
  - _self_

name: my_task
dataset_type: my_task

shape_meta:
  obs:
    point_cloud:
      shape: [512, 3]       # [num_points, channels] -- 3=XYZ, 6=XYZRGB
    agent_pos:
      shape: [7]             # robot state dimension (e.g., joint angles)
  action:
    shape: [7]               # action dimension

dataset:
  zarr_path: data/my_task.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: ${training.seed}
  val_ratio: 0.02
